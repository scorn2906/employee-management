<header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 md:px-6">
  <button
    (click)="menuToggle.emit()"
    class="md:hidden p-2 rounded-lg hover:bg-gray-100">
    <lucide-icon [img]="icons.Menu" [size]="20"></lucide-icon>
  </button>

  <div class="hidden md:block"></div>

  <div class="flex items-center gap-4">
    <button class="p-2 rounded-lg hover:bg-gray-100 relative">
      <lucide-icon [img]="icons.Bell" [size]="20"></lucide-icon>
    </button>
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-sm font-medium">
        A
      </div>
      <span class="hidden md:block text-sm font-medium text-gray-700">Admin</span>
    </div>
  </div>
</header>
